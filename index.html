<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>InfoLora</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="info-board" aria-label="Painel institucional InfoLora">
      <header class="brand-band brand-band--top" aria-hidden="true"></header>
      <div class="brand-band brand-band--top-logos" aria-hidden="true"></div>

      <section class="content-row">
        <section class="panel panel--main" aria-label="Area principal do painel"></section>

        <aside class="panel panel--weather" aria-label="Meteorologia">
          <h1>METEREOLOGIA</h1>
        </aside>
      </section>

      <div class="brand-band brand-band--bottom-logos" aria-hidden="true"></div>
      <footer class="brand-band brand-band--bottom" aria-hidden="true"></footer>
    </section>
  </main>
</body>
</html>
