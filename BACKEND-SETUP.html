     GUIA: EXEMPLO DE SERVIDOR BACKEND (Node.js + Express)

     para servir dados ao Portal Escolar.

<!--
     ARQUIVO: server.js
     
     Copie este código para um arquivo server.js na raiz do projeto backend.
     Depois execute: node server.js
-->

<script type="text/plain" id="server-code">
// ========================================
// CONFIGURAÇÃO INICIAL
// ========================================

const express = require('express');
const cors = require('cors');
require('dotenv').config();

const app = express();
const PORT = process.env.PORT || 3000;

// Middleware
app.use(cors());
app.use(express.json());

// ========================================
// DADOS SIMULADOS (Em produção, usar banco de dados)
// ========================================

const schoolData = {
    calendar: [
        { id: 1, date: '2026-05-15', name: 'Exames Finais', type: 'exam', description: 'Início dos exames finais' },
        { id: 2, date: '2026-06-01', name: 'Férias de Verão', type: 'holiday', description: 'Início das férias escolares' },
        { id: 3, date: '2026-05-05', name: 'Dia da Escola', type: 'activity', description: 'Celebração do dia da escola' }
    ],
    
    menus: {
        '2026-04-23': {
            date: '2026-04-23',
            entrada: 'Sopa de Abóbora',
            pratoPrincipal: 'Frango Grelhado com Batata',
            acompanhamento: 'Salada Mista',
            sobremesa: 'Maçã Fresca',
            bebida: 'Água ou Sumo Natural',
            alergenos: ['glúten']
        }
    },
    
    consumption: {
        today: { electricity: 285, water: 1240, heating: 92, timestamp: new Date() },
        yesterday: { electricity: 265, water: 1100, heating: 85 },
        thisWeek: { electricity: 1850, water: 8200, heating: 650 },
        lastWeek: { electricity: 1920, water: 8500, heating: 680 }
    },
    
    airQuality: {
        '317': { co2: 320, status: 'Excelente' },
        '318': { co2: 425, status: 'Bom' },
        '319': { co2: 450, status: 'Bom' },
        '320': { co2: 680, status: 'Aceitável' },
        '321': { co2: 720, status: 'Aceitável' }
    }
};

// ========================================
// ROTAS: CALENDÁRIO
// ========================================

app.get('/api/calendar', (req, res) => {
    res.json(schoolData.calendar);
});

app.post('/api/calendar', authenticateToken, (req, res) => {
    const newEvent = {
        id: schoolData.calendar.length + 1,
        ...req.body
    };
    schoolData.calendar.push(newEvent);
    res.json(newEvent);
});

// ========================================
// ROTAS: EMENTA
// ========================================

app.get('/api/menu/:date', (req, res) => {
    const menu = schoolData.menus[req.params.date];
    
    if (menu) {
        res.json(menu);
    } else {
        res.status(404).json({ error: 'Ementa não encontrada' });
    }
});

app.post('/api/menu/:date', authenticateToken, (req, res) => {
    schoolData.menus[req.params.date] = {
        date: req.params.date,
        ...req.body
    };
    res.json(schoolData.menus[req.params.date]);
});

// ========================================
// ROTAS: CONSUMO
// ========================================

app.get('/api/consumption', (req, res) => {
    res.json(schoolData.consumption);
});

app.get('/api/consumption/history', (req, res) => {
    const days = parseInt(req.query.days) || 30;
    
    // Simular histórico
    const history = [];
    for (let i = 0; i < days; i++) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        
        history.push({
            date: date.toISOString().split('T')[0],
            electricity: 280 + Math.random() * 30,
            water: 1200 + Math.random() * 100,
            heating: 85 + Math.random() * 15
        });
    }
    
    res.json({ history: history.reverse() });
});

// ========================================
// ROTAS: QUALIDADE DO AR
// ========================================

app.get('/api/air-quality', (req, res) => {
    res.json(schoolData.airQuality);
});

app.get('/api/air-quality/:room', (req, res) => {
    const quality = schoolData.airQuality[req.params.room];
    
    if (quality) {
        res.json({ room: req.params.room, ...quality });
    } else {
        res.status(404).json({ error: 'Sala não encontrada' });
    }
});

// ========================================
// ROTAS: AUTENTICAÇÃO
// ========================================

// Dados de utilizadores simulados (em produção, usar banco de dados)
const users = [
    { id: 1, email: 'admin@school.edu', password: 'admin123', role: 'admin' },
    { id: 2, email: 'teacher@school.edu', password: 'teacher123', role: 'teacher' },
    { id: 3, email: 'student@school.edu', password: 'student123', role: 'student' }
];

app.post('/api/auth/login', (req, res) => {
    const { email, password } = req.body;
    
    const user = users.find(u => u.email === email && u.password === password);
    
    if (user) {
        const token = generateToken(user);
        res.json({
            token,
            user: {
                id: user.id,
                email: user.email,
                role: user.role
            }
        });
    } else {
        res.status(401).json({ error: 'Credenciais inválidas' });
    }
});

// ========================================
// MIDDLEWARE: AUTENTICAÇÃO
// ========================================

function authenticateToken(req, res, next) {
    const authHeader = req.headers['authorization'];
    const token = authHeader && authHeader.split(' ')[1];
    
    if (!token) {
        return res.status(401).json({ error: 'Token não fornecido' });
    }
    
    // Verificar token (simplificado)
    if (token === 'valid_token') {
        next();
    } else {
        res.status(403).json({ error: 'Token inválido' });
    }
}

// ========================================
// FUNÇÃO: GERAR TOKEN
// ========================================

function generateToken(user) {
    // Em produção, usar JWT (jsonwebtoken)
    return Buffer.from(JSON.stringify(user)).toString('base64');
}

// ========================================
// WEBSOCKET: ATUALIZAÇÕES EM TEMPO REAL
// ========================================

const WebSocket = require('ws');
const http = require('http');

const server = http.createServer(app);
const wss = new WebSocket.Server({ server });

wss.on('connection', (ws) => {
    console.log('✅ Cliente WebSocket conectado');
    
    // Enviar dados iniciais
    ws.send(JSON.stringify({
        type: 'connection_success',
        message: 'Conectado ao servidor'
    }));
    
    // Simular atualizações
    const interval = setInterval(() => {
        // Consumo atualizado
        schoolData.consumption.today.electricity += Math.floor(Math.random() * 5 - 2);
        
        ws.send(JSON.stringify({
            type: 'consumption_update',
            payload: schoolData.consumption
        }));
    }, 30000); // A cada 30 segundos
    
    ws.on('close', () => {
        console.log('❌ Cliente WebSocket desconectado');
        clearInterval(interval);
    });
    
    ws.on('error', (error) => {
        console.error('Erro WebSocket:', error);
    });
});

// ========================================
// ROTA: STATUS DO SERVIDOR
// ========================================

app.get('/api/status', (req, res) => {
    res.json({
        status: 'online',
        timestamp: new Date(),
        version: '1.0.0',
        uptime: process.uptime()
    });
});

// ========================================
// ERROR HANDLER
// ========================================

app.use((err, req, res, next) => {
    console.error(err.stack);
    res.status(500).json({ error: 'Erro interno do servidor' });
});

// ========================================
// INICIAR SERVIDOR
// ========================================

server.listen(PORT, () => {
    console.log(`
    ╔════════════════════════════════════╗
    ║  Portal Escolar - Servidor Ativo   ║
    ╚════════════════════════════════════╝
    
    🚀 Servidor rodando em http://localhost:${PORT}
    
    Endpoints disponíveis:
    
    📅 Calendário:
       GET  /api/calendar
       POST /api/calendar (autenticado)
    
    🍽️  Ementa:
       GET  /api/menu/:date
       POST /api/menu/:date (autenticado)
    
    ⚡ Consumo:
       GET  /api/consumption
       GET  /api/consumption/history?days=30
    
    💨 Qualidade do Ar:
       GET  /api/air-quality
       GET  /api/air-quality/:room
    
    🔐 Autenticação:
       POST /api/auth/login
    
    📊 Status:
       GET  /api/status
    
    🔌 WebSocket:
       ws://localhost:${PORT}
    
    Teste com:
       curl http://localhost:${PORT}/api/status
    `);
});

// ========================================
// GRACEFUL SHUTDOWN
// ========================================

process.on('SIGTERM', () => {
    console.log('⚠️ SIGTERM recebido, encerrando servidor...');
    server.close(() => {
        console.log('✅ Servidor encerrado');
        process.exit(0);
    });
});
</script>
